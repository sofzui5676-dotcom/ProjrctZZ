version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: smart-dashboard-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: node:20
    container_name: smart-dashboard-backend
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && node server/server.js"
    ports:
      - "4000:4000"
    env_file:
      - .env
